<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiny Towne — Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="dashboard.html">Tiny Towne</a>
        <div class="ms-auto">
            <span class="text-light me-3" style="font-size:0.85rem">Admin</span>
            <button class="btn btn-outline-warning btn-sm" onclick="logout()">Logout</button>
        </div>
    </div>
</nav>

<div id="mockBanner" class="alert alert-mock mb-0">
    Running in mock mode — data is simulated
</div>

<div class="container py-5">
    <h2 class="mb-4 fw-bold">Dashboard</h2>

    <div class="row g-4">
        <!-- Button Management -->
        <div class="col-md-4">
            <a href="buttons.html" class="dash-card card dash-card-buttons">
                <div class="card-body">
                    <div class="card-icon">&#9881;</div>
                    <h5 class="card-title">Charge Buttons</h5>
                    <p class="text-muted mb-0">Create, edit, and manage charge buttons</p>
                </div>
            </a>
        </div>

        <!-- Daily Report -->
        <div class="col-md-4">
            <a href="report-daily.html" class="dash-card card dash-card-daily">
                <div class="card-body">
                    <div class="card-icon">&#128202;</div>
                    <h5 class="card-title">Daily Report</h5>
                    <p class="text-muted mb-0">Usage breakdown by date and activity</p>
                </div>
            </a>
        </div>

        <!-- Card History -->
        <div class="col-md-4">
            <a href="report-card.html" class="dash-card card dash-card-history">
                <div class="card-body">
                    <div class="card-icon">&#128179;</div>
                    <h5 class="card-title">Card History</h5>
                    <p class="text-muted mb-0">Search transactions by card or driver ID</p>
                </div>
            </a>
        </div>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
    requireAuth();
    if (!CONFIG.USE_MOCK) {
        document.getElementById('mockBanner').classList.add('d-none');
    }
</script>

</body>
</html>
