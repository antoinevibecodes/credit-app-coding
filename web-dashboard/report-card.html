<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiny Towne — Card History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="dashboard.html">Tiny Towne</a>
        <div class="ms-auto">
            <a href="dashboard.html" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
            <button class="btn btn-outline-warning btn-sm" onclick="logout()">Logout</button>
        </div>
    </div>
</nav>

<div id="mockBanner" class="alert alert-mock mb-0">
    Running in mock mode — data is simulated
</div>

<div class="container py-4">
    <h2 class="fw-bold mb-4">Card Transaction History</h2>

    <!-- Search bar -->
    <div class="row mb-4">
        <div class="col-md-8">
            <div class="input-group">
                <input type="text" class="form-control" id="searchInput"
                       placeholder="Enter card RFID hex (e.g. a1b2c3d4) or driver ID (e.g. 12345)">
                <button class="btn btn-primary fw-bold" onclick="searchCard()">Search</button>
            </div>
        </div>
    </div>

    <!-- Results count -->
    <div id="resultCount" class="mb-3 fw-bold" style="display:none"></div>

    <!-- Transaction table -->
    <div class="card border-0 shadow-sm" id="resultsCard" style="display:none">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Time</th>
                            <th>Driver</th>
                            <th>Activity</th>
                            <th>Type</th>
                            <th>Credits</th>
                            <th>Transaction</th>
                        </tr>
                    </thead>
                    <tbody id="transactionTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="emptyState" class="text-center text-muted py-5">
        Enter a card RFID or driver ID to search for transaction history.
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script>
    requireAuth();
    if (!CONFIG.USE_MOCK) document.getElementById('mockBanner').classList.add('d-none');

    // Enter key to search
    document.getElementById('searchInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') searchCard();
    });

    async function searchCard() {
        const query = document.getElementById('searchInput').value.trim();
        if (!query) {
            alert('Please enter a card ID or driver ID');
            return;
        }

        // Build request
        let searchQuery = {
            PageNumber: 1,
            PageSize: 50
        };

        // Detect if hex or numeric
        if (/^[0-9]+$/.test(query)) {
            searchQuery.HasDriverId = true;
            searchQuery.DriverId = parseInt(query);
            searchQuery.HasRfidUidL = false;
            searchQuery.RfidUidL = 0;
        } else {
            // Hex RFID
            try {
                const rfidL = parseInt(query, 16);
                searchQuery.HasDriverId = false;
                searchQuery.DriverId = 0;
                searchQuery.HasRfidUidL = true;
                searchQuery.RfidUidL = rfidL;
            } catch (e) {
                alert('Invalid card ID format');
                return;
            }
        }

        const result = await fetchTransactionHistory(searchQuery);
        if (!result.ok) {
            alert('Error fetching transactions');
            return;
        }

        const data = result.data;
        document.getElementById('resultCount').textContent = 'Found ' + data.TotalCount + ' transactions';
        document.getElementById('resultCount').style.display = '';
        document.getElementById('resultsCard').style.display = '';
        document.getElementById('emptyState').style.display = 'none';

        const tbody = document.getElementById('transactionTable');

        if (data.Transactions.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">No transactions found for this card.</td></tr>';
            return;
        }

        tbody.innerHTML = data.Transactions.map(tx => {
            const creditClass = tx.CreditAmount < 0 ? 'text-danger fw-bold' : 'text-success fw-bold';
            const driverDisplay = tx.IsAnonymous
                ? '<span class="badge badge-anonymous">Anonymous / Birthday Card</span>'
                : tx.DriverName;

            // Format timestamp
            let timeDisplay = tx.Timestamp;
            try {
                const d = new Date(tx.Timestamp);
                timeDisplay = d.toLocaleString();
            } catch(e) {}

            return `
                <tr>
                    <td class="text-muted" style="font-size:0.85rem">${timeDisplay}</td>
                    <td>${driverDisplay}</td>
                    <td class="fw-bold">${tx.ButtonName}</td>
                    <td class="text-muted">${tx.EntitlementTypeName}</td>
                    <td class="${creditClass}">${tx.CreditAmount}</td>
                    <td>${tx.TransactionType}</td>
                </tr>
            `;
        }).join('');
    }
</script>

</body>
</html>
