<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiny Towne — Charge Buttons</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="dashboard.html">Tiny Towne</a>
        <div class="ms-auto">
            <a href="dashboard.html" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
            <button class="btn btn-outline-warning btn-sm" onclick="logout()">Logout</button>
        </div>
    </div>
</nav>

<div id="mockBanner" class="alert alert-mock mb-0">
    Running in mock mode — data is simulated
</div>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0">Charge Buttons</h2>
        <button class="btn btn-primary" onclick="showCreateModal()">+ Add Button</button>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Color</th>
                            <th>Name</th>
                            <th>Type</th>
                            <th>Credits</th>
                            <th>Options</th>
                            <th>Status</th>
                            <th>Order</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="buttonsTable">
                        <tr><td colspan="8" class="text-center py-4 text-muted">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Create/Edit Modal -->
<div class="modal fade" id="buttonModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Create Button</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editButtonId">

                <div class="mb-3">
                    <label class="form-label fw-bold">Button Name</label>
                    <input type="text" class="form-control" id="btnName" placeholder="e.g. Track, Bumper Cars">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Entitlement Type</label>
                    <select class="form-select" id="btnEntitlementType"></select>
                </div>

                <div class="row">
                    <div class="col-6 mb-3">
                        <label class="form-label fw-bold">Credit Amount</label>
                        <input type="number" class="form-control" id="btnCredits" placeholder="5" min="1">
                    </div>
                    <div class="col-6 mb-3">
                        <label class="form-label fw-bold">Sort Order</label>
                        <input type="number" class="form-control" id="btnSortOrder" placeholder="1" min="0">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Color</label>
                    <div class="input-group">
                        <input type="color" class="form-control form-control-color" id="btnColorPicker" value="#e3a21a">
                        <input type="text" class="form-control" id="btnColorHex" value="#e3a21a" maxlength="7">
                    </div>
                </div>

                <div class="form-check mb-2">
                    <input class="form-check-input" type="checkbox" id="btnForce">
                    <label class="form-check-label">Force option (bypass credit check)</label>
                </div>

                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="btnActive" checked>
                    <label class="form-check-label">Active</label>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="saveBtn" onclick="saveButton()">Save</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script>
    requireAuth();
    if (!CONFIG.USE_MOCK) document.getElementById('mockBanner').classList.add('d-none');

    let buttonModal;
    let entitlementTypes = [];

    document.addEventListener('DOMContentLoaded', async () => {
        buttonModal = new bootstrap.Modal(document.getElementById('buttonModal'));

        // Sync color picker <-> hex input
        document.getElementById('btnColorPicker').addEventListener('input', (e) => {
            document.getElementById('btnColorHex').value = e.target.value;
        });
        document.getElementById('btnColorHex').addEventListener('input', (e) => {
            const val = e.target.value;
            if (/^#[0-9a-fA-F]{6}$/.test(val)) {
                document.getElementById('btnColorPicker').value = val;
            }
        });

        // Load entitlement types for dropdown
        const typesResult = await fetchEntitlementTypes();
        if (typesResult.ok) {
            entitlementTypes = typesResult.data;
            const select = document.getElementById('btnEntitlementType');
            entitlementTypes.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t.Id;
                opt.textContent = t.Name;
                select.appendChild(opt);
            });
        }

        loadButtons();
    });

    async function loadButtons() {
        const result = await fetchChargeButtons();
        const tbody = document.getElementById('buttonsTable');

        if (!result.ok) {
            tbody.innerHTML = '<tr><td colspan="8" class="text-center text-danger py-4">Error loading buttons</td></tr>';
            return;
        }

        if (result.data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-4">No buttons configured. Click "+ Add Button" to create one.</td></tr>';
            return;
        }

        tbody.innerHTML = result.data.map(btn => `
            <tr>
                <td><span class="color-dot" style="background:${btn.ColorHex}"></span></td>
                <td class="fw-bold">${btn.Name}</td>
                <td>${btn.EntitlementTypeName}</td>
                <td>${btn.CreditAmount}</td>
                <td>${btn.IsForceOption ? '<span class="badge badge-force">Force</span>' : '—'}</td>
                <td><span class="badge ${btn.IsActive ? 'badge-active' : 'badge-inactive'}">${btn.IsActive ? 'Active' : 'Inactive'}</span></td>
                <td>${btn.SortOrder}</td>
                <td>
                    <button class="btn btn-sm btn-outline-primary me-1" onclick="showEditModal(${btn.Id})">Edit</button>
                    <button class="btn btn-sm btn-outline-danger" onclick="confirmDelete(${btn.Id}, '${btn.Name}')">Delete</button>
                </td>
            </tr>
        `).join('');
    }

    function showCreateModal() {
        document.getElementById('modalTitle').textContent = 'Create Button';
        document.getElementById('editButtonId').value = '';
        document.getElementById('btnName').value = '';
        document.getElementById('btnEntitlementType').value = '4';
        document.getElementById('btnCredits').value = '';
        document.getElementById('btnSortOrder').value = '';
        document.getElementById('btnColorPicker').value = '#e3a21a';
        document.getElementById('btnColorHex').value = '#e3a21a';
        document.getElementById('btnForce').checked = false;
        document.getElementById('btnActive').checked = true;
        buttonModal.show();
    }

    async function showEditModal(id) {
        const result = await fetchChargeButtons();
        if (!result.ok) return;

        const btn = result.data.find(b => b.Id === id);
        if (!btn) return;

        document.getElementById('modalTitle').textContent = 'Edit Button';
        document.getElementById('editButtonId').value = btn.Id;
        document.getElementById('btnName').value = btn.Name;
        document.getElementById('btnEntitlementType').value = btn.EntitlementTypeId;
        document.getElementById('btnCredits').value = btn.CreditAmount;
        document.getElementById('btnSortOrder').value = btn.SortOrder;
        document.getElementById('btnColorPicker').value = btn.ColorHex;
        document.getElementById('btnColorHex').value = btn.ColorHex;
        document.getElementById('btnForce').checked = btn.IsForceOption;
        document.getElementById('btnActive').checked = btn.IsActive;
        buttonModal.show();
    }

    async function saveButton() {
        const editId = document.getElementById('editButtonId').value;
        const name = document.getElementById('btnName').value.trim();
        const credits = parseInt(document.getElementById('btnCredits').value);

        if (!name || isNaN(credits)) {
            alert('Name and credit amount are required');
            return;
        }

        const typeId = parseInt(document.getElementById('btnEntitlementType').value);
        const typeName = entitlementTypes.find(t => t.Id === typeId)?.Name || '';

        const button = {
            Name: name,
            EntitlementTypeId: typeId,
            EntitlementTypeName: typeName,
            CreditAmount: credits,
            IsForceOption: document.getElementById('btnForce').checked,
            IsActive: document.getElementById('btnActive').checked,
            SortOrder: parseInt(document.getElementById('btnSortOrder').value) || 0,
            ColorHex: document.getElementById('btnColorHex').value || '#e3a21a'
        };

        let result;
        if (editId) {
            button.Id = parseInt(editId);
            result = await updateChargeButton(button);
        } else {
            result = await createChargeButton(button);
        }

        if (result.ok) {
            buttonModal.hide();
            loadButtons();
        } else {
            alert('Error: ' + (result.message || 'Unknown error'));
        }
    }

    async function confirmDelete(id, name) {
        if (!confirm('Delete "' + name + '"?')) return;

        const result = await deleteChargeButton(id);
        if (result.ok) {
            loadButtons();
        } else {
            alert('Error deleting button');
        }
    }
</script>

</body>
</html>
