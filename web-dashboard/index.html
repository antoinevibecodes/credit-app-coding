<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiny Towne — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-container">
    <div class="card login-card">
        <div class="card-header">
            Tiny Towne Dashboard
        </div>
        <div class="card-body p-4">
            <p class="text-muted text-center mb-4">Enter your admin PIN to continue</p>

            <div id="errorAlert" class="alert alert-danger d-none" role="alert"></div>

            <div class="mb-3">
                <label for="pinInput" class="form-label fw-bold">Admin PIN</label>
                <input type="password" class="form-control form-control-lg text-center"
                       id="pinInput" placeholder="****" maxlength="10"
                       inputmode="numeric" autofocus>
            </div>

            <button id="loginBtn" class="btn btn-warning btn-lg w-100 fw-bold" onclick="handleLogin()">
                Login
            </button>

            <div id="mockNotice" class="alert alert-mock mt-3">
                Mock mode — use PIN: <strong>1234</strong>
            </div>
        </div>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
    // If already logged in, redirect
    if (isLoggedIn()) {
        window.location.href = 'dashboard.html';
    }

    // Hide mock notice if not in mock mode
    if (!CONFIG.USE_MOCK) {
        document.getElementById('mockNotice').classList.add('d-none');
    }

    // Enter key to login
    document.getElementById('pinInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') handleLogin();
    });

    async function handleLogin() {
        const pin = document.getElementById('pinInput').value.trim();
        const errorAlert = document.getElementById('errorAlert');
        const btn = document.getElementById('loginBtn');

        if (!pin) {
            errorAlert.textContent = 'Please enter a PIN';
            errorAlert.classList.remove('d-none');
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Logging in...';
        errorAlert.classList.add('d-none');

        const result = await login(pin);

        if (result.success) {
            window.location.href = 'dashboard.html';
        } else {
            errorAlert.textContent = result.message || 'Invalid PIN';
            errorAlert.classList.remove('d-none');
            btn.disabled = false;
            btn.textContent = 'Login';
            document.getElementById('pinInput').value = '';
            document.getElementById('pinInput').focus();
        }
    }
</script>

</body>
</html>
