<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiny Towne — Daily Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="dashboard.html">Tiny Towne</a>
        <div class="ms-auto">
            <a href="dashboard.html" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
            <button class="btn btn-outline-warning btn-sm" onclick="logout()">Logout</button>
        </div>
    </div>
</nav>

<div id="mockBanner" class="alert alert-mock mb-0">
    Running in mock mode — data is simulated
</div>

<div class="container py-4">
    <h2 class="fw-bold mb-4">Daily Report</h2>

    <!-- Date picker -->
    <div class="row mb-4">
        <div class="col-auto">
            <div class="input-group">
                <input type="date" class="form-control" id="reportDate">
                <button class="btn btn-warning fw-bold" onclick="loadReport()">Load Report</button>
            </div>
        </div>
    </div>

    <!-- Summary cards -->
    <div class="row g-3 mb-4" id="summaryCards" style="display:none">
        <div class="col-6 col-md-3">
            <div class="stat-card bg-stat-blue">
                <div class="stat-value" id="totalTransactions">0</div>
                <div class="stat-label">Total Transactions</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="stat-card bg-stat-red">
                <div class="stat-value" id="totalCredits">0</div>
                <div class="stat-label">Credits Used</div>
            </div>
        </div>
    </div>

    <!-- Activity breakdown -->
    <div class="card border-0 shadow-sm" id="breakdownCard" style="display:none">
        <div class="card-header bg-white fw-bold">Activity Breakdown</div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Activity</th>
                            <th>Type</th>
                            <th>Rides/Uses</th>
                            <th>Credits Used</th>
                            <th>Usage</th>
                        </tr>
                    </thead>
                    <tbody id="activityTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="emptyState" class="text-center text-muted py-5">
        Select a date and click "Load Report" to view the daily breakdown.
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script>
    requireAuth();
    if (!CONFIG.USE_MOCK) document.getElementById('mockBanner').classList.add('d-none');

    // Default to today
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('reportDate').value = today;

    async function loadReport() {
        const date = document.getElementById('reportDate').value;
        if (!date) {
            alert('Please select a date');
            return;
        }

        const result = await fetchDailyReport(date);
        if (!result.ok) {
            alert('Error loading report');
            return;
        }

        const report = result.data;

        // Show summary
        document.getElementById('totalTransactions').textContent = report.TotalTransactions;
        document.getElementById('totalCredits').textContent = report.TotalCreditsUsed;
        document.getElementById('summaryCards').style.display = '';
        document.getElementById('breakdownCard').style.display = '';
        document.getElementById('emptyState').style.display = 'none';

        // Find max usage for bar chart scaling
        const maxUsage = Math.max(...report.Activities.map(a => a.UsageCount), 1);

        // Build activity table
        const tbody = document.getElementById('activityTable');
        tbody.innerHTML = report.Activities.map(a => {
            const pct = Math.round((a.UsageCount / maxUsage) * 100);
            return `
                <tr>
                    <td class="fw-bold">${a.ButtonName}</td>
                    <td class="text-muted">${a.EntitlementTypeName}</td>
                    <td>${a.UsageCount}</td>
                    <td class="text-danger fw-bold">${a.TotalCreditsUsed}</td>
                    <td style="min-width:120px">
                        <div class="usage-bar">
                            <div class="usage-bar-fill" style="width:${pct}%"></div>
                        </div>
                    </td>
                </tr>
            `;
        }).join('');
    }
</script>

</body>
</html>
