<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiny Towne — Charge Card</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="dashboard.html">Tiny Towne</a>
        <div class="ms-auto">
            <a href="dashboard.html" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
            <button class="btn btn-outline-warning btn-sm" onclick="logout()">Logout</button>
        </div>
    </div>
</nav>

<div id="mockBanner" class="alert alert-mock mb-0">
    Running in mock mode — data is simulated
</div>

<div class="container py-4">
    <h2 class="fw-bold mb-4">Charge Card</h2>

    <!-- Step 1: Identify card -->
    <div id="step1" class="card border-0 shadow-sm mb-4">
        <div class="card-header bg-white fw-bold">Step 1 — Identify Card</div>
        <div class="card-body">
            <div class="row align-items-end">
                <div class="col-md-7">
                    <label class="form-label">Enter RFID hex or driver ID</label>
                    <div class="input-group">
                        <input type="text" class="form-control" id="cardInput"
                               placeholder="e.g. a1b2c3d4 or 10000">
                        <button class="btn btn-primary fw-bold" onclick="identifyCard()">Find Card</button>
                    </div>
                </div>
            </div>

            <!-- Identified driver info -->
            <div id="identifiedDriver" class="mt-3 p-3 rounded" style="display:none; background:#f0f9ff; border:1px solid #bde0fe">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <span class="fw-bold" id="chargeDriverName"></span>
                        <span class="text-muted ms-2">ID: <span id="chargeDriverId"></span></span>
                    </div>
                    <button class="btn btn-sm btn-outline-secondary" onclick="clearCard()">Change Card</button>
                </div>
                <div class="mt-2" id="chargeDriverCredits"></div>
            </div>

            <div id="cardNotFound" class="mt-3 text-danger fw-bold" style="display:none">
                Card not found. Check the ID and try again.
            </div>
        </div>
    </div>

    <!-- Step 2: Select charge button -->
    <div id="step2" class="card border-0 shadow-sm mb-4" style="display:none">
        <div class="card-header bg-white fw-bold">Step 2 — Select Activity</div>
        <div class="card-body">
            <div id="buttonGrid" class="charge-button-grid"></div>
        </div>
    </div>

    <!-- Step 3: Confirm -->
    <div id="step3" class="card border-0 shadow-sm mb-4" style="display:none">
        <div class="card-header bg-white fw-bold">Confirm Charge</div>
        <div class="card-body text-center">
            <p class="mb-1">Charging <strong id="confirmDriver"></strong></p>
            <p class="mb-1">Activity: <strong id="confirmButton"></strong></p>
            <p class="mb-3">Credits to deduct: <strong class="text-danger" id="confirmCredits"></strong></p>
            <button class="btn btn-danger btn-lg fw-bold px-5" onclick="executeCharge()">Charge Now</button>
            <button class="btn btn-outline-secondary btn-lg ms-2" onclick="cancelCharge()">Cancel</button>
        </div>
    </div>

    <!-- Success message -->
    <div id="successMsg" class="alert alert-success fw-bold text-center" style="display:none">
        <span id="successText"></span>
        <button class="btn btn-sm btn-success ms-3" onclick="resetCharge()">Charge Another</button>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script>
    requireAuth();
    if (!CONFIG.USE_MOCK) document.getElementById('mockBanner').classList.add('d-none');

    let currentDriver = null;
    let selectedButton = null;
    let allButtons = [];

    document.getElementById('cardInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') identifyCard();
    });

    async function identifyCard() {
        const query = document.getElementById('cardInput').value.trim();
        if (!query) return;

        document.getElementById('identifiedDriver').style.display = 'none';
        document.getElementById('cardNotFound').style.display = 'none';
        document.getElementById('step2').style.display = 'none';
        document.getElementById('step3').style.display = 'none';

        let searchQuery = {};
        if (/^[0-9]+$/.test(query)) {
            searchQuery = { HasDriverId: true, DriverId: parseInt(query), HasRfidUidHex: false };
        } else {
            searchQuery = { HasDriverId: false, HasRfidUidHex: true, RfidUidHex: query.toLowerCase() };
        }

        const result = await fetchDriverInfo(searchQuery);
        if (!result.ok) {
            document.getElementById('cardNotFound').style.display = '';
            return;
        }

        currentDriver = result.data;
        document.getElementById('chargeDriverName').textContent = currentDriver.FirstName + ' ' + currentDriver.LastName;
        document.getElementById('chargeDriverId').textContent = currentDriver.DriverId;

        // Show current credits
        const creditsHtml = (currentDriver.Entitlements || []).map(e =>
            `<span class="badge bg-light text-dark me-2 mb-1" style="font-size:0.85rem">${e.EntitlementTypeName}: <strong>${e.Credits}</strong></span>`
        ).join('');
        document.getElementById('chargeDriverCredits').innerHTML = creditsHtml;
        document.getElementById('identifiedDriver').style.display = '';

        // Load buttons
        await loadChargeButtons();
    }

    function clearCard() {
        currentDriver = null;
        selectedButton = null;
        document.getElementById('identifiedDriver').style.display = 'none';
        document.getElementById('step2').style.display = 'none';
        document.getElementById('step3').style.display = 'none';
        document.getElementById('cardInput').value = '';
        document.getElementById('cardInput').focus();
    }

    async function loadChargeButtons() {
        const result = await fetchChargeButtons();
        if (!result.ok) return;

        allButtons = result.data.filter(b => b.IsActive);
        const grid = document.getElementById('buttonGrid');

        grid.innerHTML = allButtons.map(btn => `
            <button class="charge-btn" style="background-color:${btn.ColorHex}"
                    onclick="selectButton(${btn.Id})" id="chargeBtn${btn.Id}">
                <div class="charge-btn-name">${btn.Name}</div>
                <div class="charge-btn-credits">${btn.CreditAmount} credits</div>
                ${btn.IsForceOption ? '<div class="charge-btn-force">FORCE</div>' : ''}
            </button>
        `).join('');

        document.getElementById('step2').style.display = '';
    }

    function selectButton(id) {
        selectedButton = allButtons.find(b => b.Id === id);
        if (!selectedButton || !currentDriver) return;

        // Highlight selected
        document.querySelectorAll('.charge-btn').forEach(el => el.classList.remove('charge-btn-selected'));
        document.getElementById('chargeBtn' + id).classList.add('charge-btn-selected');

        // Show confirm
        document.getElementById('confirmDriver').textContent = currentDriver.FirstName + ' ' + currentDriver.LastName;
        document.getElementById('confirmButton').textContent = selectedButton.Name;
        document.getElementById('confirmCredits').textContent = selectedButton.CreditAmount;
        document.getElementById('step3').style.display = '';
    }

    function cancelCharge() {
        selectedButton = null;
        document.querySelectorAll('.charge-btn').forEach(el => el.classList.remove('charge-btn-selected'));
        document.getElementById('step3').style.display = 'none';
    }

    async function executeCharge() {
        if (!currentDriver || !selectedButton) return;

        const result = await chargeCard(
            currentDriver.DriverId,
            selectedButton.Id,
            selectedButton.Name,
            selectedButton.CreditAmount,
            selectedButton.EntitlementTypeId
        );

        if (result.ok) {
            document.getElementById('step2').style.display = 'none';
            document.getElementById('step3').style.display = 'none';
            document.getElementById('successText').textContent =
                selectedButton.CreditAmount + ' credits charged to ' + currentDriver.FirstName + ' ' + currentDriver.LastName +
                ' (' + selectedButton.Name + '). Remaining: ' + result.data.RemainingCredits;
            document.getElementById('successMsg').style.display = '';
        } else {
            alert('Error: ' + (result.message || 'Charge failed'));
        }
    }

    function resetCharge() {
        currentDriver = null;
        selectedButton = null;
        document.getElementById('successMsg').style.display = 'none';
        document.getElementById('step2').style.display = 'none';
        document.getElementById('step3').style.display = 'none';
        document.getElementById('identifiedDriver').style.display = 'none';
        document.getElementById('cardInput').value = '';
        document.getElementById('cardInput').focus();
    }
</script>

</body>
</html>
